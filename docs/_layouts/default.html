<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
  <link rel="icon" href="{{ '/assets/images/deadpool-wolverine-icon-logo-png_seeklogo-524508.png' | relative_url }}" type="image/png">
  <link rel="shortcut icon" href="{{ '/assets/images/deadpool-wolverine-icon-logo-png_seeklogo-524508.png' | relative_url }}" type="image/png">
  <link rel="apple-touch-icon" href="{{ '/assets/images/deadpool-wolverine-icon-logo-png_seeklogo-524508.png' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>

</head>
<body>
<header class="topbar">
    <!-- Cụm bên trái: Nút Hamburger và Logo -->
    <div class="topbar-left">
      <button class="icon-btn nav-toggle-always" id="nav-toggle" aria-label="Open navigation" aria-controls="sidebar" aria-expanded="false">☰</button>
      <a class="topbar-brand" href="{{ '/' | relative_url }}">
        <img src="{{ '/assets/images/deadpool-wolverine-icon-logo-png_seeklogo-524508.png' | relative_url }}" alt="Stremio logo" class="topbar-logo">
        <span class="topbar-brand-text">
          <span class="topbar-title">BimBip Stremio</span>
          <span class="topbar-subtitle">Hướng Dẫn Xem Phim Từ A Tới Á</span>
        </span>
      </a>
    </div>

    <!-- Cụm bên phải: , Social, Ko-fi, Đổi theme -->
    <div class="topbar-right">
      
      <!-- Ô  -->
      <div class="topbar-search">
        <input type="text" id="search-input" placeholder="Alô cần tìm gì đó?" aria-label="Search" autocomplete="off">
        <!-- Khung chứa kết quả tìm kiếm thả xuống -->
        <div id="search-results" class="search-dropdown" style="display: none;">
          <div id="search-inner" class="search-content">
          </div>
        </div>
      </div>

      <!-- Các nút Mạng xã hội -->
      <div class="topbar-social">
        <!-- Facebook -->
        <a href="https://www.facebook.com/bimbipnausup" class="social-btn" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M22.675 0H1.325C.593 0 0 .593 0 1.325v21.351C0 23.407.593 24 1.325 24H12.82v-9.294H9.692v-3.622h3.128V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12V24h6.116c.73 0 1.323-.593 1.323-1.325V1.325C24 .593 23.407 0 22.675 0z"/></svg>
        </a>
        <!-- Discord -->
        <a href="https://discord.gg/mcudisvn" class="social-btn" target="_blank" rel="noopener noreferrer" aria-label="Discord">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189z"/></svg>
        </a>
      </div>

      <!-- Nút Đổi giao diện Sáng/Tối -->
      <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme" aria-pressed="false">◐</button>
    </div>
  </header>

  <button class="nav-backdrop" id="nav-backdrop" aria-hidden="true"></button>

  <aside class="sidebar" id="sidebar" aria-label="Guide navigation">
    <div class="sidebar__inner">
      <nav id="sidebar-nav"></nav>
      <!-- Đã xóa phần Footer chứa Ko-fi ở đây vì đã chuyển lên Topbar -->
    </div>
  </aside>

  <div class="layout">
    <main class="content" id="main-content">
      <article class="doc-card fade-in">
        {{ content }}
        <section class="quick-nav" id="quick-nav" hidden>
          <details id="quick-nav-details">
            <summary>Tốc Biến</summary>
            <ul id="quick-nav-list"></ul>
          </details>
        </section>
        <nav class="pager" id="pager" aria-label="Page navigation" hidden></nav>
      </article>
    </main>
  </div>

  <script>
    window.HOME_URL = {{ '/' | relative_url | jsonify }};
    window.DOCS_PAGES = [
      {% assign all_pages = site.pages | sort: 'path' %}
      {% assign first_guide = true %}
      {% for p in all_pages %}
      {% if p.path contains 'guide/' and p.path contains '.md' %}
      {% unless first_guide %},{% endunless %}
      {
        "path": {{ p.path | jsonify }},
        "url": {{ p.url | relative_url | jsonify }},
        "title": {{ p.title | default: p.name | replace: '.md', '' | jsonify }},
        "content": {{ p.content | strip_html | strip_newlines | jsonify }} 
      }
      {% assign first_guide = false %}
      {% endif %}
      {% endfor %}
    ];
    window.CURRENT_PATH = {{ page.path | jsonify }};

    document.addEventListener("DOMContentLoaded", function() {
      /* =========================================
         1. CHỨC NĂNG ẨN/HIỆN SIDEBAR (MENU TRÁI)
         ========================================= */
      const body = document.body;
      const navToggle = document.getElementById("nav-toggle");
      const navBackdrop = document.getElementById("nav-backdrop");

      // Mở/Đóng Sidebar khi bấm vào nút ☰
      if (navToggle) {
        navToggle.addEventListener("click", function() {
          e.preventDefault();  // Ngăn chặn hành vi mặc định của thẻ
          e.stopPropagation(); // Chặn file main.js không cho phép can thiệp
          body.classList.toggle("nav-open");
        });
      }

      // ĐÓNG Sidebar khi bấm ra ngoài (bấm vào màn mờ)
      if (navBackdrop) {
        navBackdrop.addEventListener("click", function() {
          e.preventDefault();
          e.stopPropagation(); // Tránh lỗi click đúp
          body.classList.remove("nav-open");
        });
      }

      // ĐÓNG Sidebar khi nhấn phím ESC trên bàn phím
      document.addEventListener("keydown", function(e) {
        if (e.key === "Escape" && body.classList.contains("nav-open")) {
          body.classList.remove("nav-open");
        }
      });
        /* =========================================
       CHỨC NĂNG LIVE SEARCH (TÌM KIẾM NỘI BỘ)
       ========================================= */

      const searchInput = document.getElementById('search-input');
      const searchDropdown = document.getElementById('search-results'); // Thẻ cha (giữ border)
      const searchContent = document.querySelector('#search-results .search-content'); // Thẻ con (cuộn nội dung)
      const docsPages = window.DOCS_PAGES || [];
    
      if (!searchInput || !searchContent) return;
    
      searchInput.addEventListener('input', function(e) {
        const query = e.target.value.toLowerCase().trim();
        
        if (query.length === 0) {
          searchDropdown.style.display = 'none';
          return;
        }
        
        const matches = docsPages.filter(page => {
          const title = (page.title || "").toLowerCase();
          const content = (page.content || "").toLowerCase();
          return title.includes(query) || content.includes(query);
        }).map(page => {
          let snippet = "";
          if (page.content && page.content.toLowerCase().includes(query)) {
            const matchIndex = page.content.toLowerCase().indexOf(query);
            const start = Math.max(0, matchIndex - 30);
            const end = Math.min(page.content.length, matchIndex + query.length + 40);
            let rawSnippet = page.content.substring(start, end);
            const regex = new RegExp(`(${query})`, "gi");
            snippet = `<div class="search-snippet">...${rawSnippet.replace(regex, '<b style="color: var(--accent-2)">$1</b>')}...</div>`;
          }
          return `<a href="${page.url}"><div class="search-title">⚡ ${page.title}</div>${snippet}</a>`;
        });
    
        searchContent.innerHTML = matches.length > 0 ? matches.join('') : '<div class="search-no-results">💀 Không tìm thấy kết quả nào</div>';
        searchDropdown.style.display = 'block';
      });
    
      document.addEventListener('click', function(e) {
        if (!searchInput.contains(e.target) && !searchDropdown.contains(e.target)) {
          searchDropdown.style.display = 'none';
        }
      });
    });
  </script>
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
